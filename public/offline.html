<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin Conexión – Cacomi</title>
  <style>
    :root {
      --primary: #f97316;
      --bg: #0a0a0a;
      --card: #141414;
      --border: #2a2a2a;
      --fg: #fafafa;
      --muted: #a1a1aa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .icon-wrap {
      width: 96px;
      height: 96px;
      border-radius: 32px;
      background: var(--card);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2rem;
      box-shadow: 0 25px 50px -12px rgba(249,115,22,0.15);
    }
    .icon-wrap svg {
      width: 42px;
      height: 42px;
      color: var(--primary);
      stroke: var(--primary);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }
    p {
      color: var(--muted);
      max-width: 28rem;
      line-height: 1.6;
      margin-bottom: 2.5rem;
      font-size: 1rem;
    }
    p strong { color: var(--fg); }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 22rem;
    }
    @media (min-width: 480px) {
      .actions { flex-direction: row; }
    }
    button, .btn-link {
      flex: 1;
      padding: 0.875rem 1.5rem;
      border-radius: 1rem;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    button:active, .btn-link:active { transform: scale(0.95); }
    button {
      background: var(--primary);
      color: #fff;
      border: none;
      box-shadow: 0 10px 30px -5px rgba(249,115,22,0.35);
    }
    button:hover { opacity: 0.9; }
    .btn-link {
      background: var(--card);
      color: var(--fg);
      border: 1px solid var(--border);
    }
    .btn-link:hover { background: var(--border); }
    .tip {
      margin-top: 3rem;
      padding: 1.5rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      max-width: 28rem;
      text-align: left;
    }
    .tip-label {
      font-size: 0.65rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }
    .tip p { margin: 0; font-size: 0.875rem; color: var(--muted); }
  </style>
</head>
<body>
  <div class="icon-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18M8.111 8.111A5.25 5.25 0 0016.5 12M5.175 5.175a9 9 0 0112.65 12.65M4.393 4.393C2.9 6.087 2 8.444 2 11a9 9 0 009 9c2.556 0 4.913-.9 6.607-2.393" />
    </svg>
  </div>

  <h1>Sin conexión</h1>
  <p>
    Tu dispositivo ha perdido la señal. No te preocupes,
    <strong>Cacomi sigue contigo</strong>. Puedes consultar tus
    recetas guardadas sin interrupciones.
  </p>

  <div class="actions">
    <button onclick="window.location.reload()">Reintentar</button>
    <a class="btn-link" href="/">Ir al Inicio</a>
  </div>

  <div class="tip">
    <div class="tip-label">Tip Offline</div>
    <p>Las recetas que guardaste (icono de descarga) están disponibles 100% sin conexión, incluyendo sus imágenes.</p>
  </div>
</body>
</html>
